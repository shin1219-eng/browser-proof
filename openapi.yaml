openapi: 3.1.0
info:
  title: Browser Proof System API
  description: Stateless MCP bridge for browser-based verification.
  version: 1.0.0
servers:
  - url: https://proof.reprompt.jp
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /mcp:
    post:
      summary: Stateless MCP (Streamable HTTP)
      description: Process JSON-RPC requests for MCP tools.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [jsonrpc, id, method]
              properties:
                jsonrpc: { type: string, example: "2.0" }
                id: { type: [string, integer] }
                method: { type: string }
                params: { type: object }
      responses:
        '200':
          description: JSON-RPC Response
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
